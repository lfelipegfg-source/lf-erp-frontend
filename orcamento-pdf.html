<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orçamento — LF ERP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --text:    #0f172a;
      --muted:   #64748b;
      --border:  #e2e8f0;
      --surface: #ffffff;
      --bg:      #f8fafc;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }

    /* ── Toolbar ──────────────────────────────────────────── */
    #toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #toolbar h1 { font-size: 14px; font-weight: 800; flex: 1; }
    .btn { padding: 7px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-light   { background: var(--bg); border: 1px solid var(--border); color: var(--text); }

    /* ── Documento ────────────────────────────────────────── */
    #documento {
      max-width: 800px;
      margin: 24px auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 48px;
    }

    /* Cabeçalho */
    .doc-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 2px solid var(--primary);
    }
    .doc-empresa h1 { font-size: 22px; font-weight: 900; color: var(--primary); }
    .doc-empresa p  { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .doc-titulo {
      text-align: right;
    }
    .doc-titulo h2 { font-size: 20px; font-weight: 900; color: var(--text); }
    .doc-titulo .num { font-size: 14px; color: var(--muted); margin-top: 4px; }

    /* Metadados */
    .doc-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
      padding: 16px;
      background: var(--bg);
      border-radius: 10px;
    }
    .doc-meta__item label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 4px; }
    .doc-meta__item span  { font-size: 13px; font-weight: 700; }

    /* Cliente */
    .doc-section { margin-bottom: 24px; }
    .doc-section h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 8px; }
    .doc-section p  { font-size: 14px; font-weight: 700; }

    /* Tabela de itens */
    .doc-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    .doc-table th {
      padding: 10px 12px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .doc-table th.right, .doc-table td.right { text-align: right; }
    .doc-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .doc-table tr:last-child td { border-bottom: none; }
    .doc-table td strong { display: block; font-size: 13px; }
    .doc-table td small  { font-size: 11px; color: var(--muted); }

    /* Totais */
    .doc-totais {
      margin-left: auto;
      width: 280px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .doc-totais__row {
      display: flex;
      justify-content: space-between;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .doc-totais__row:last-child { border-bottom: none; }
    .doc-totais__row--total {
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      font-size: 15px;
    }

    /* Observação */
    .doc-obs {
      padding: 14px;
      background: var(--bg);
      border-radius: 10px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .doc-obs strong { display: block; margin-bottom: 4px; color: var(--text); }

    /* Rodapé */
    .doc-footer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* ── IMPRESSÃO ─────────────────────────────────────────── */
    @page { margin: 10mm; size: A4 portrait; }

    @media print {
      body { background: #fff; }
      #toolbar { display: none !important; }
      #documento {
        margin: 0;
        border: none;
        border-radius: 0;
        padding: 0;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <h1 id="toolbarTitle">Orçamento — LF ERP</h1>
    <button class="btn btn-primary" id="btnImprimir">
      <i>🖨</i> Imprimir / Salvar PDF
    </button>
    <button class="btn btn-light" id="btnFechar">✕ Fechar</button>
  </div>

  <div id="documento">
    <div style="text-align:center;padding:40px;color:#64748b">Carregando orçamento...</div>
  </div>

  <script src="./js/orcamento-pdf.js"></script>
</body>
</html>
