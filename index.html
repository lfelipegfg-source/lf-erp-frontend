<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LF ERP</title>
<style>
body { font-family: Arial; margin:0; background:#f4f6f9;}
header { background:#b30000; color:#fff; padding:15px; display:flex; justify-content:space-between;}
.container { display:flex;}
.sidebar { width:220px; background:#1f2937; color:#fff; padding:10px;}
.sidebar button { width:100%; padding:10px; margin:5px 0; border:none; background:none; color:#fff; cursor:pointer;}
.content { flex:1; padding:20px;}
.card { background:#fff; padding:15px; margin-bottom:15px;}
.hidden { display:none;}
</style>
</head>

<body>

<div id="login">
<h2>Login</h2>
<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="app" class="hidden">

<header>
<h2>LF ERP</h2>
<div id="userInfo"></div>
<button onclick="logout()">Sair</button>
</header>

<div class="container">

<div class="sidebar">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('produtos')">Produtos</button>
<button onclick="show('fornecedores')">Fornecedores</button>
<button onclick="show('compras')">Compras</button>
</div>

<div class="content">

<div id="dashboard" class="card">Dashboard</div>

<div id="produtos" class="card hidden">
<h3>Novo Produto</h3>
<input id="p_nome" placeholder="Nome">
<input id="p_preco" placeholder="Preço">
<input id="p_custo" placeholder="Custo">
<input id="p_min" placeholder="Estoque mínimo">
<button onclick="salvarProduto()">Salvar</button>

<h3>Lista</h3>
<table><tbody id="listaProdutos"></tbody></table>
</div>

<div id="fornecedores" class="card hidden">
<input id="f_nome" placeholder="Nome">
<input id="f_tel" placeholder="Telefone">
<button onclick="salvarFornecedor()">Salvar</button>
<table><tbody id="listaFornecedores"></tbody></table>
</div>

<div id="compras" class="card hidden">
<select id="c_fornecedor"></select>
<select id="c_produto"></select>
<input id="c_qtd" placeholder="Qtd">
<input id="c_custo" placeholder="Custo">
<button onclick="addItem()">Adicionar</button>
<ul id="itens"></ul>
<button onclick="salvarCompra()">Salvar</button>
</div>

</div>
</div>
</div>

<script>
const API="https://lf-erp-backend.onrender.com";

let token, empresa, tipo;
let produtos=[], fornecedores=[], itens=[];

function headers(){
return { "Content-Type":"application/json", authorization:token };
}

function login(){
fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({usuario:usuario.value,senha:senha.value})})
.then(r=>r.json()).then(d=>{
token=d.token; empresa=d.empresa; tipo=d.tipo;
login.style.display="none"; app.classList.remove("hidden");
carregarTudo();
});
}

function logout(){ location.reload(); }

function show(id){
["dashboard","produtos","fornecedores","compras"].forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

async function api(url,opt={}) {
const r=await fetch(API+url,{...opt,headers:{...headers()}});
return r.json();
}

async function carregarTudo(){
await carregarProdutos();
await carregarFornecedores();
}

async function carregarProdutos(){
produtos = tipo==="admin"? await api("/admin/produtos") : await api("/produtos/"+empresa);

listaProdutos.innerHTML = produtos.map(p=>`
<tr>
<td>${p.nome}</td>
<td>${p.estoque}</td>
</tr>`).join("");

c_produto.innerHTML = produtos.map(p=>`<option value="${p.id}">${p.nome}</option>`).join("");
}

function salvarProduto(){
api("/produtos",{method:"POST",
body:JSON.stringify({
nome:p_nome.value,
preco:p_preco.value,
custo:p_custo.value,
estoque_minimo:p_min.value
})}).then(carregarProdutos);
}

async function carregarFornecedores(){
fornecedores = await api("/fornecedores/"+empresa);

listaFornecedores.innerHTML = fornecedores.map(f=>`
<tr><td>${f.nome}</td></tr>`).join("");

c_fornecedor.innerHTML = fornecedores.map(f=>`<option value="${f.id}">${f.nome}</option>`).join("");
}

function salvarFornecedor(){
api("/fornecedores",{method:"POST",
body:JSON.stringify({nome:f_nome.value,telefone:f_tel.value})})
.then(carregarFornecedores);
}

function addItem(){
itens.push({
produto_id:c_produto.value,
quantidade:c_qtd.value,
custo_unitario:c_custo.value
});
itensEl.innerHTML = itens.map(i=>`<li>${i.produto_id}</li>`).join("");
}

function salvarCompra(){
api("/compras",{method:"POST",
body:JSON.stringify({
fornecedor_id:c_fornecedor.value,
itens:itens
})});
}

</script>

</body>
</html>
