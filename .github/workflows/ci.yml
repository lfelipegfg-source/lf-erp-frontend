name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check essential files exist
        run: |
          files=(
            "index.html" "admin.html"
            "css/style.css"
            "js/app.js" "js/api.js" "js/auth.js" "js/dashboard.js"
            "js/feedback.js" "js/vendas.js" "js/compras.js"
            "js/produtos.js" "js/clientes.js" "js/configuracoes.js"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "ERRO: arquivo obrigatorio ausente: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Syntax check JS files
        run: |
          ERROS=0
          for f in js/*.js; do
            result=$(node --input-type=module < "$f" 2>&1)
            if echo "$result" | grep -qiE "SyntaxError"; then
              echo "SYNTAX ERROR em $f:"
              echo "$result"
              ERROS=$((ERROS+1))
            else
              echo "OK: $f"
            fi
          done
          if [ $ERROS -gt 0 ]; then exit 1; fi

      - name: Fail on debug console.log
        run: |
          count=$(grep -rn "console\.log\b" js/ --include="*.js" | grep -v "//.*console\.log" | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "ERRO: $count console.log(s) de debug encontrados:"
            grep -rn "console\.log\b" js/ --include="*.js" | grep -v "//.*console\.log"
            exit 1
          fi
          echo "OK: nenhum console.log de debug encontrado"

      - name: Check no window.confirm or window.prompt
        run: |
          count=$(grep -rn "window\.confirm\|window\.prompt" js/ --include="*.js" | grep -v "//.*window\." | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "ERRO: $count window.confirm/window.prompt encontrados:"
            grep -rn "window\.confirm\|window\.prompt" js/ --include="*.js" | grep -v "//.*window\."
            exit 1
          fi
          echo "OK: nenhum window.confirm/window.prompt encontrado"

      - name: Check all JS imports reference existing files
        run: |
          ERROS=0
          for f in js/*.js; do
            imports=$(grep "^import.*from '\./\|^import.*from \"\./" "$f" 2>/dev/null | grep -oP "(?<=['\"]\./)[^'\"]+")
            for imp in $imports; do
              target="js/${imp}.js"
              if [ ! -f "$target" ] && [ ! -f "js/${imp}" ]; then
                echo "ERRO: $f importa '$imp' mas arquivo nao encontrado"
                ERROS=$((ERROS+1))
              fi
            done
          done
          if [ $ERROS -gt 0 ]; then exit 1; fi
          echo "OK: todos os imports resolvem arquivos existentes"
