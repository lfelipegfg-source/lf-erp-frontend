<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impressão de Etiquetas — LF ERP</title>

  <!-- Fonte de código de barras Code 39 (sem JS, apenas CSS) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39+Text&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --border:  #e2e8f0;
      --text:    #0f172a;
      --muted:   #64748b;
      --surface: #ffffff;
      --bg:      #f8fafc;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Toolbar (oculta na impressão) ─────────────────────────── */
    #toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #toolbar h1 { font-size: 15px; font-weight: 800; flex: 1; }

    .toolbar-group { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .toolbar-group label { color: var(--muted); font-weight: 600; }
    .toolbar-group select,
    .toolbar-group input[type=number] {
      padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; width: 72px;
    }

    .btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-light   { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Preview area ───────────────────────────────────────────── */
    #preview {
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .label-grid {
      display: grid;
      gap: 8px;
    }
    .label-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .label-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .label-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

    /* ── Etiqueta individual ────────────────────────────────────── */
    .etiqueta {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px 12px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-align: center;
      min-height: 110px;
    }

    .etiqueta__empresa {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      font-weight: 700;
    }

    .etiqueta__nome {
      font-size: 12px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.3;
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .etiqueta__variacao {
      font-size: 10px;
      color: var(--muted);
    }

    .etiqueta__preco {
      font-size: 20px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
    }

    .etiqueta__barcode {
      font-family: 'Libre Barcode 39 Text', sans-serif;
      font-size: 32px;
      line-height: 1;
      color: #000;
      letter-spacing: -1px;
      max-width: 100%;
      overflow: hidden;
      margin-top: 2px;
    }

    .etiqueta--sem-barcode .etiqueta__barcode { display: none; }

    #semDados {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    /* ── PRINT ──────────────────────────────────────────────────── */
    @page { margin: 6mm; }

    @media print {
      #toolbar { display: none !important; }

      body { background: #fff; }

      #preview { padding: 0; max-width: 100%; }

      .etiqueta {
        break-inside: avoid;
        border: 1px solid #999;
        border-radius: 0;
        page-break-inside: avoid;
      }

      .label-grid { gap: 2mm; }
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <h1><i class="fa-solid fa-tag"></i> Impressão de Etiquetas — LF ERP</h1>

    <div class="toolbar-group">
      <label>Colunas</label>
      <select id="selColunas">
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
      </select>
    </div>

    <div class="toolbar-group">
      <label>Cópias extra</label>
      <input type="number" id="copias" value="0" min="0" max="50" />
    </div>

    <div class="toolbar-group">
      <label><input type="checkbox" id="chkBarcode" checked /> Código de barras</label>
    </div>

    <button class="btn btn-primary" id="btnImprimir">
      <i class="fa-solid fa-print"></i> Imprimir
    </button>

    <button class="btn btn-light" id="btnFechar">
      <i class="fa-solid fa-xmark"></i> Fechar
    </button>
  </div>

  <div id="preview">
    <div id="semDados">
      <i class="fa-solid fa-triangle-exclamation" style="font-size:2rem;margin-bottom:12px;display:block"></i>
      Nenhuma etiqueta para imprimir.<br>
      <small>Volte ao módulo de Produtos e clique em "Etiqueta" em um produto.</small>
    </div>
  </div>

  <script src="./js/etiquetas.js"></script>
</body>
</html>
